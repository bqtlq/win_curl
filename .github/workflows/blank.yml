name: 编译 myfetch

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    strategy:
      matrix:
        arch: [x86, x64]

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 CMake
        uses: lukka/get-cmake@latest

      - name: 获取 vcpkg
        run: git clone https://github.com/microsoft/vcpkg.git

      - name: 初始化 vcpkg
        run: vcpkg\bootstrap-vcpkg.bat
        shell: cmd

      - name: 安装 libcurl
        run: vcpkg\vcpkg install curl:${{ matrix.arch }}-windows-static
        shell: cmd

      - name: 编译 myfetch
        run: |
          if "${{ matrix.arch }}"=="x86" (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars32.bat"
          ) else (
            call "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\VC\Auxiliary\Build\vcvars64.bat"
          )

          cl /nologo /O2 /MT ^
          /I vcpkg\installed\${{ matrix.arch }}-windows-static\include ^
          myfetch.c ^
          vcpkg\installed\${{ matrix.arch }}-windows-static\lib\libcurl.lib ^
          ws2_32.lib wldap32.lib crypt32.lib ^
          /Fe:myfetch-${{ matrix.arch }}.exe
        shell: cmd

      - name: 上传 EXE
        uses: actions/upload-artifact@v4
        with:
          name: myfetch-${{ matrix.arch }}
          path: myfetch-${{ matrix.arch }}.exe
